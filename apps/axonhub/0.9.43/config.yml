# AxonHub default configuration for the 1Panel template.
# Database connection is injected by docker-compose environment variables.

server:
  port: 8090
  name: "AxonHub"
  base_path: ""
  request_timeout: "30s"
  llm_request_timeout: "600s"
  debug: false

db:
  dialect: "postgres"
  dsn: ""
  debug: false

cache:
  mode: "memory"

log:
  name: "axonhub"
  debug: false
  level: "info"
  encoding: "json"
  output: "stdio"

metrics:
  enabled: false

dumper:
  enabled: false

gc:
  cron: "0 2 * * *"
