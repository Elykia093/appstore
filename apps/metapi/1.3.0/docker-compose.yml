services:
  metapi:
    image: 1467078763/metapi:v1.3.0@sha256:46cada1a8a7e55d6d40752c9e2e6b61c38de4edf0dde85e0f398b79994cc16e8
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${PANEL_APP_PORT_HTTP}:4000"
    environment:
      AUTH_TOKEN: ${AUTH_TOKEN}
      PROXY_TOKEN: ${PROXY_TOKEN}
      CHECKIN_CRON: ${CHECKIN_CRON}
      BALANCE_REFRESH_CRON: ${BALANCE_REFRESH_CRON}
      PORT: 4000
      DATA_DIR: /app/data
      TZ: Asia/Shanghai
    volumes:
      - ./data:/app/data
    labels:
      createdBy: "Apps"
    networks:
      - 1panel-network

networks:
  1panel-network:
    external: true
