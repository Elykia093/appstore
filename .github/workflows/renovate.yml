name: Renovate

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
    paths:
      - "apps/**/docker-compose.yml"
      - "renovate.json"
      - ".github/workflows/renovate.yml"
  workflow_dispatch:
    inputs:
      manual-trigger:
        description: 'Manually trigger Renovate'
        default: ''

concurrency:
  group: renovate
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    env:
      LOG_LEVEL: debug
      RENOVATE_REPOSITORIES: ${{ github.repository }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Check Renovate token mode
        env:
          HAS_RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN != '' }}
          HAS_MERGE_ADMIN_TOKEN: ${{ secrets.MERGE_ADMIN_TOKEN != '' }}
        run: |
          if [[ "$HAS_RENOVATE_TOKEN" == "true" || "$HAS_MERGE_ADMIN_TOKEN" == "true" ]]; then
            echo "Renovate will use a token that can trigger downstream workflows."
          else
            echo "::notice::Renovate is using GITHUB_TOKEN. This can create PRs when repository Actions permissions allow it, but GitHub suppresses workflows triggered by GITHUB_TOKEN branch pushes. Configure RENOVATE_TOKEN or MERGE_ADMIN_TOKEN if renovate/* branch pushes must trigger downstream workflows automatically."
          fi
      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.15
        with:
          token: ${{ secrets.RENOVATE_TOKEN || secrets.MERGE_ADMIN_TOKEN || secrets.GITHUB_TOKEN }}
