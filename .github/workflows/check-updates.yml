name: Check App Updates

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Check upstream releases and registry digests
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -o pipefail
          python scripts/check-updates.py | tee "$GITHUB_STEP_SUMMARY"
