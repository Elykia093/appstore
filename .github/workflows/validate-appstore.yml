name: Validate App Store

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "data.yaml"
      - "README.md"
      - "renovate.json"
      - "scripts/validate-appstore.py"
      - "scripts/resolve-app-version.py"
      - "scripts/sync-app-version-directories.py"
      - "scripts/sync-readme-app-table.py"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "apps/**"
      - "data.yaml"
      - "README.md"
      - "renovate.json"
      - "scripts/validate-appstore.py"
      - "scripts/resolve-app-version.py"
      - "scripts/sync-app-version-directories.py"
      - "scripts/sync-readme-app-table.py"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check PyYAML

      - name: Normalize Renovate PR app versions
        if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'renovate/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/sync-app-version-directories.py

      - name: Validate app store metadata
        run: python scripts/validate-appstore.py

      - name: Check README app table sync
        run: python scripts/sync-readme-app-table.py --check

      - name: Compile validation helpers
        run: python -m py_compile scripts/validate-appstore.py scripts/resolve-app-version.py scripts/sync-app-version-directories.py scripts/sync-readme-app-table.py

      - name: Validate Renovate version helper syntax
        run: bash -n .github/workflows/renovate-app-version.sh

      - name: Check whitespace errors
        run: git diff --check
