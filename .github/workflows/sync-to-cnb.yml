name: Sync commits to CNB (optional)

on:
  schedule:
    - cron: "0 0 * * *"     # 每天凌晨 0 点强制同步（兜底）
    - cron: "0 */6 * * *"   # 每 6 小时检查一次
  push:
    branches:
      - main
  workflow_call:            # 允许被其他工作流调用
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual trigger reason'
        required: false
        default: 'Manual run'
      force_sync:
        description: 'Force sync without checking for new commits'
        required: false
        default: 'false'
      require_cnb_config:
        description: 'Fail the run when CNB sync configuration is missing'
        required: false
        default: 'false'

concurrency:
  group: sync-to-cnb
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      synced: ${{ steps.sync.outputs.synced }}

    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Determine sync mode
        id: mode
        run: |
          # 每天凌晨的定时任务强制同步
          if [[ "${{ github.event.schedule }}" == "0 0 * * *" ]]; then
            echo "Daily scheduled sync - forcing sync"
            echo "force=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 手动触发且指定强制同步
          if [[ "${{ github.event.inputs.force_sync }}" == "true" ]]; then
            echo "Manual force sync requested"
            echo "force=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # 被 workflow_call 调用时强制同步
          if [[ "${{ github.event_name }}" == "workflow_call" ]]; then
            echo "Called by another workflow - forcing sync"
            echo "force=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "force=false" >> $GITHUB_OUTPUT

      - name: Check if there are new commits
        if: steps.mode.outputs.force != 'true'
        id: check
        run: |
          NEW_COMMITS=$(git log --since="6 hours ago" --oneline)
          if [ -z "$NEW_COMMITS" ]; then
            echo "No new commits in the last 6 hours, skip sync."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "New commits found:"
            echo "$NEW_COMMITS"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for other open PRs
        id: pr-check
        env:
          GH_TOKEN: ${{ secrets.MERGE_ADMIN_TOKEN != '' && secrets.MERGE_ADMIN_TOKEN || github.token }}
        run: |
          open_pr_count=$(gh pr list --repo "${{ github.repository }}" --state open --json number,title,headRefName --jq 'length')
          echo "open_pr_count=$open_pr_count" >> "$GITHUB_OUTPUT"

          if [[ "$open_pr_count" -gt 0 ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "There are still $open_pr_count open PR(s); skipping CNB sync for now."
            gh pr list --repo "${{ github.repository }}" --state open --json number,title,headRefName --jq '.[] | "#\(.number) \(.headRefName) \(.title)"'
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "No other open PRs found. Proceeding with CNB sync."
          fi

      - name: Check CNB configuration
        id: cnb-config
        env:
          CNB_USERNAME: ${{ secrets.CNB_USERNAME }}
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
          CNB_REPOSITORY: ${{ vars.CNB_REPOSITORY }}
        run: |
          missing=()

          if [[ -z "$CNB_USERNAME" ]]; then
            missing+=("CNB_USERNAME secret")
          fi

          if [[ -z "$CNB_TOKEN" ]]; then
            missing+=("CNB_TOKEN secret")
          fi

          if [[ -z "$CNB_REPOSITORY" ]]; then
            missing+=("CNB_REPOSITORY repository variable")
          fi

          if [[ "${#missing[@]}" -gt 0 ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            {
              echo "### CNB sync skipped"
              echo ""
              echo "Missing configuration:"
              for item in "${missing[@]}"; do
                echo "- $item"
              done
              echo ""
              echo "Set these values in repository Settings before expecting CNB mirror updates."
            } >> "$GITHUB_STEP_SUMMARY"

            echo "CNB sync is not configured; missing: ${missing[*]}."

            if [[ "${{ github.event.inputs.require_cnb_config }}" == "true" ]]; then
              echo "require_cnb_config=true, failing because CNB sync configuration is incomplete."
              exit 1
            fi
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
            {
              echo "### CNB sync configuration found"
              echo ""
              echo "CNB mirror sync is enabled for this run."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "CNB sync configuration found."
          fi

      - name: Sync to CNB
        id: sync
        if: steps.cnb-config.outputs.configured == 'true' && (steps.mode.outputs.force == 'true' || steps.check.outputs.skip == 'false') && steps.pr-check.outputs.skip != 'true'
        env:
          CNB_USERNAME: ${{ secrets.CNB_USERNAME }}
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
          CNB_REPOSITORY: ${{ vars.CNB_REPOSITORY }}
        run: |
          echo "Syncing to CNB mirror..."
          rm -rf .git
          git init
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add .
          git commit -m "Sync commit ==> [$(date +"%Y-%m-%d %H:%M:%S")]"
          git branch -M main
          git remote add origin "https://${CNB_USERNAME}:${CNB_TOKEN}@cnb.cool/${CNB_REPOSITORY}.git"

          pushed=false
          for attempt in 1 2 3; do
            if git push --force --quiet origin main; then
              pushed=true
              break
            fi

            echo "Push failed on attempt $attempt/3, retrying in 5 seconds..."
            sleep 5
          done

          if [[ "$pushed" != "true" ]]; then
            echo "Failed to sync to CNB after retries."
            exit 1
          fi

          echo "synced=true" >> $GITHUB_OUTPUT

      - name: Report result
        run: |
          if [[ "${{ steps.sync.outputs.synced }}" == "true" ]]; then
            echo "✅ Successfully synced to CNB mirror"
          elif [[ "${{ steps.cnb-config.outputs.configured }}" != "true" ]]; then
            echo "⏭️ Skipped sync because CNB is not configured. Check the job summary for the missing setting names."
          elif [[ "${{ steps.pr-check.outputs.skip }}" == "true" ]]; then
            echo "⏭️ Skipped sync because other PRs are still open"
          else
            echo "⏭️ Skipped sync (no new commits)"
          fi
